<!--Display a list of countries with proper bullets / numbering.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bullets / numbering</title>
</head>
<body>
    <h1>An ordered list</h1>

    <ol>
        <li>INDIA</li>
        <li>CHINA</li>
        <li>NEPAL</li>
        <li>USA</li>
    </ol>
    <hr>
        <h1>An unordered list</h1>
    <ul>
        <li>LOS ANGELES</li>
        <li>LAS SANTOS</li>
        <li>LAS VEGAS</li>
        <li>CALIFORNIA</li>
    </ul>

</body>
</html>
